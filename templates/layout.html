<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StopPay</title>
    
    <link rel="icon" type="image/png" href="/assets/favicons/favicon-32x32.png" sizes="32x32">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/apple-touch-icon.png">
    
    <meta name="theme-color" content="#1a1a1a">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body data-theme="dark">

<!-- 🔥 ГОЛОВНИЙ КОНТЕЙНЕР -->
<div class="main-wrapper">

    <nav>
        <div class="custom-select" id="langSelector" translate="no">
            <div class="select-btn" onclick="toggleMenu()">
                <div style="display: flex; align-items: stretch; gap: 8px;">
                    <img src="" id="currentFlag" class="flag-icon">
                    <span id="currentShort">UA</span>
                </div>
                <span class="arrow">▼</span>
            </div>
            <div class="select-dropdown" id="dropdownList"></div>
        </div>
        <button class="btn-tool" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </nav>

    <header>
        <div class="counter-container">
            <span id="counterLabel">Saved:</span>
            <span id="moneyCounter">0</span>
            <span id="currency">₴</span>
        </div>

        <div id="mainTitle">
            <a href="/">
                <img src="/Logo.png" alt="StopPay">
            </a>
        </div>
    </header>

    <main id="mainContent">
        {{ content }}
    </main>

    <div class="donate-section">
        <h3 id="donateTitle"></h3>
        <p id="donateDesc"></p>
        <a href="https://buymeacoffee.com/pandadreamgs" target="_blank" rel="noopener noreferrer"
           class="btn-donate" 
           id="donateBtn" >
           ☕ Buy Me a Coffee
        </a>
    </div>

    <div id="seoContent" class="seo-block"></div>

    <footer>
        <div class="footer-main">
            <span id="footerCreated">Автор:</span> 
            <span class="brand-name">PandaDream Game Studio</span> 
            <span class="panda-emoji">🐼</span>
        </div>
        <div id="footerSlogan" class="footer-slogan"></div>
    </footer>

</div>
<!-- 🔥 КІНЕЦЬ main-wrapper -->


<!-- ❗ FAB І МОДАЛКА ЗАЛИШАЮТЬСЯ ПОЗА WRAPPER -->
<div class="fab-btn" id="fabBtn" onclick="handleFabClick()">
    <span id="fabIcon">+</span>
</div>

<div class="modal-overlay" id="feedbackModal" onclick="closeModalOutside(event)">
    <div class="modal-content">
        <h3 id="modalTitle">Додати сервіс</h3>
        <p id="modalDesc">Напишіть назву, і ми додамо його.</p>
        <input type="text" 
               id="aiServiceInput" 
               class="modal-input" 
               placeholder="Назва сервісу...">
        <button class="modal-btn" 
                id="modalBtn" 
                onclick="sendToAi()">
                Надіслати
        </button>
    </div>
</div>

<script src="/assets/js/script.js"></script>

</body>
</html>
